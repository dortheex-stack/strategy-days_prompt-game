<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Duel — Host Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #e8ff47;
      --accent2: #47c8ff;
      --accent3: #ff47a8;
      --text: #f0f0f0;
      --muted: #666680;
      --success: #47ff9c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, #e8ff4710 0%, transparent 60%);
      pointer-events: none;
    }

    /* HEADER */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .timer {
      font-family: 'DM Mono', monospace;
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
      transition: color 0.3s;
    }

    .timer.urgent { color: #ff4747; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .timer-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      letter-spacing: -0.01em;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-start { background: var(--accent); color: #0a0a0f; }
    .btn-stop { background: var(--surface); color: #ff4747; border: 1px solid #ff4747; }
    .btn-reset { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

    /* MAIN GRID */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 0;
      height: 100%;
      overflow: hidden;
    }

    /* STAT BAR */
    .stat-bar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      padding: 16px 24px;
      border-right: 1px solid var(--border);
    }

    .stat:last-child { border-right: none; }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* LEADERBOARD */
    .leaderboard-panel {
      overflow-y: auto;
      padding: 24px;
      border-right: 1px solid var(--border);
    }

    .panel-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 32px 1fr auto auto;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      transition: border-color 0.3s, transform 0.3s;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .lb-row.top1 { border-color: var(--accent); background: #e8ff4708; }
    .lb-row.top2 { border-color: #aaa; }
    .lb-row.top3 { border-color: #cd7f32; }

    .lb-pos {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .lb-row.top1 .lb-pos { color: var(--accent); font-weight: 700; }

    .lb-name {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-track {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .lb-track.procurement { color: #ff47a8; border-color: #ff47a820; background: #ff47a808; }
    .lb-track.operations { color: var(--accent2); border-color: #47c8ff20; background: #47c8ff08; }
    .lb-track.strategy { color: var(--accent); border-color: #e8ff4720; background: #e8ff4708; }

    .lb-score {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 1rem;
      color: var(--text);
      white-space: nowrap;
    }

    /* SIDEBAR */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    /* SCORE DISTRIBUTION */
    .dist-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 80px;
      margin-top: 12px;
    }

    .dist-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .dist-bar {
      width: 100%;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      transition: height 0.5s ease;
      min-height: 2px;
      opacity: 0.7;
    }

    .dist-bar-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
    }

    /* RECENT SUBMISSIONS */
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .recent-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .recent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .recent-name {
      font-size: 0.8rem;
      font-weight: 700;
    }

    .recent-score {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
    }

    .recent-prompt {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .empty .big { font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <div class="logo">PROMPT<span>DUEL</span> <span style="color:var(--muted);font-weight:400;font-size:0.8rem">— HOST</span></div>
  <div class="header-center">
    <div class="timer" id="timer">10:00</div>
    <div class="timer-label">Remaining</div>
  </div>
  <div class="header-right">
    <button class="btn btn-start" onclick="startTimer()">▶ Start</button>
    <button class="btn btn-stop" onclick="stopTimer()">■ Stop</button>
    <button class="btn btn-reset" onclick="resetTimer()">↺ Reset</button>
  </div>
</header>

<div class="dashboard">

  <!-- STAT BAR -->
  <div class="stat-bar">
    <div class="stat">
      <div class="stat-value" id="statParticipants">0</div>
      <div class="stat-label">Participants</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statSubmissions">0</div>
      <div class="stat-label">Total Submissions</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statAvg">—</div>
      <div class="stat-label">Avg Score</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statTop">—</div>
      <div class="stat-label">Top Score</div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="leaderboard-panel">
    <div class="panel-title">🏆 Live Leaderboard</div>
    <div class="leaderboard-list" id="leaderboardList">
      <div class="empty">
        <div class="big">⏳</div>
        Waiting for submissions…<br>Share the participant link to get started.
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="panel-title">📊 Score Distribution</div>
      <div class="dist-bars" id="distBars">
        <!-- generated by JS -->
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted)">0</span>
        <span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted)">100</span>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1">
      <div class="panel-title">⚡ Recent Submissions</div>
      <div class="recent-list" id="recentList">
        <div class="empty" style="padding:20px 0">No submissions yet</div>
      </div>
    </div>

  </div>
</div>

<script>
  // --- TIMER ---
  let timeLeft = 10 * 60;
  let timerInterval = null;

  function formatTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      timeLeft--;
      const el = document.getElementById('timer');
      el.textContent = formatTime(timeLeft);
      el.className = 'timer' + (timeLeft <= 60 ? ' urgent' : '');
      if (timeLeft <= 0) stopTimer();
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function resetTimer() {
    stopTimer();
    timeLeft = 10 * 60;
    const el = document.getElementById('timer');
    el.textContent = formatTime(timeLeft);
    el.className = 'timer';
  }

  // --- LEADERBOARD POLLING ---
  let prevEntries = [];

  async function fetchLeaderboard() {
    try {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      renderDashboard(data);
    } catch (e) {
      console.error('Fetch error:', e);
    }
  }

  function renderDashboard(data) {
    const { entries, totalSubmissions } = data;

    // Stats
    document.getElementById('statParticipants').textContent = entries.length;
    document.getElementById('statSubmissions').textContent = totalSubmissions;

    if (entries.length > 0) {
      const scores = entries.map(e => e.score);
      const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
      document.getElementById('statAvg').textContent = avg;
      document.getElementById('statTop').textContent = Math.max(...scores);
    }

    // Leaderboard
    const list = document.getElementById('leaderboardList');
    if (entries.length === 0) {
      list.innerHTML = `<div class="empty"><div class="big">⏳</div>Waiting for submissions…</div>`;
    } else {
      const sorted = [...entries].sort((a, b) => b.score - a.score);
      list.innerHTML = sorted.map((e, i) => `
        <div class="lb-row ${i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : ''}">
          <div class="lb-pos">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`}</div>
          <div class="lb-name">${e.name}</div>
          <div class="lb-track ${e.track}">${e.track}</div>
          <div class="lb-score">${e.score}</div>
        </div>
      `).join('');
    }

    // Distribution
    renderDistribution(entries.map(e => e.score));

    // Recent
    renderRecent(data.recent || []);
  }

  function renderDistribution(scores) {
    const buckets = Array(10).fill(0);
    scores.forEach(s => {
      const i = Math.min(Math.floor(s / 10), 9);
      buckets[i]++;
    });
    const max = Math.max(...buckets, 1);
    const labels = ['0-9','10-19','20-29','30-39','40-49','50-59','60-69','70-79','80-89','90-100'];

    document.getElementById('distBars').innerHTML = buckets.map((count, i) => `
      <div class="dist-bar-wrap">
        <div class="dist-bar" style="height:${Math.max((count / max) * 68, 2)}px"></div>
        <div class="dist-bar-label">${labels[i].split('-')[0]}</div>
      </div>
    `).join('');
  }

  function renderRecent(recent) {
    const el = document.getElementById('recentList');
    if (recent.length === 0) {
      el.innerHTML = `<div class="empty" style="padding:20px 0">No submissions yet</div>`;
      return;
    }
    el.innerHTML = recent.slice(0, 8).map(r => `
      <div class="recent-item">
        <div class="recent-header">
          <span class="recent-name">${r.name}</span>
          <span class="recent-score">${r.score}/100</span>
        </div>
        <div class="recent-prompt">${r.prompt}</div>
      </div>
    `).join('');
  }

  fetchLeaderboard();
  setInterval(fetchLeaderboard, 3000);
</script>
</body>
</html>
